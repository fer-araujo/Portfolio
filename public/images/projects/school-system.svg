<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="50%" stop-color="#0f1a12"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="icon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#047857" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Subtle pattern dots -->
  <g fill="#10b981" fill-opacity="0.03">
    <circle cx="50" cy="50" r="2"/><circle cx="150" cy="50" r="2"/>
    <circle cx="250" cy="50" r="2"/><circle cx="350" cy="50" r="2"/>
    <circle cx="450" cy="50" r="2"/><circle cx="550" cy="50" r="2"/>
    <circle cx="650" cy="50" r="2"/><circle cx="750" cy="50" r="2"/>
    <circle cx="50" cy="100" r="2"/><circle cx="150" cy="100" r="2"/>
    <circle cx="250" cy="100" r="2"/><circle cx="350" cy="100" r="2"/>
    <circle cx="450" cy="100" r="2"/><circle cx="550" cy="100" r="2"/>
    <circle cx="650" cy="100" r="2"/><circle cx="750" cy="100" r="2"/>
    <circle cx="50" cy="150" r="2"/><circle cx="150" cy="150" r="2"/>
    <circle cx="250" cy="150" r="2"/><circle cx="350" cy="150" r="2"/>
    <circle cx="450" cy="150" r="2"/><circle cx="550" cy="150" r="2"/>
    <circle cx="650" cy="150" r="2"/><circle cx="750" cy="150" r="2"/>
    <circle cx="50" cy="200" r="2"/><circle cx="150" cy="200" r="2"/>
    <circle cx="250" cy="200" r="2"/><circle cx="350" cy="200" r="2"/>
    <circle cx="450" cy="200" r="2"/><circle cx="550" cy="200" r="2"/>
    <circle cx="650" cy="200" r="2"/><circle cx="750" cy="200" r="2"/>
    <circle cx="50" cy="250" r="2"/><circle cx="150" cy="250" r="2"/>
    <circle cx="250" cy="250" r="2"/><circle cx="350" cy="250" r="2"/>
    <circle cx="450" cy="250" r="2"/><circle cx="550" cy="250" r="2"/>
    <circle cx="650" cy="250" r="2"/><circle cx="750" cy="250" r="2"/>
    <circle cx="50" cy="300" r="2"/><circle cx="150" cy="300" r="2"/>
    <circle cx="250" cy="300" r="2"/><circle cx="350" cy="300" r="2"/>
    <circle cx="450" cy="300" r="2"/><circle cx="550" cy="300" r="2"/>
    <circle cx="650" cy="300" r="2"/><circle cx="750" cy="300" r="2"/>
    <circle cx="50" cy="350" r="2"/><circle cx="150" cy="350" r="2"/>
    <circle cx="250" cy="350" r="2"/><circle cx="350" cy="350" r="2"/>
    <circle cx="450" cy="350" r="2"/><circle cx="550" cy="350" r="2"/>
    <circle cx="650" cy="350" r="2"/><circle cx="750" cy="350" r="2"/>
    <circle cx="50" cy="400" r="2"/><circle cx="150" cy="400" r="2"/>
    <circle cx="250" cy="400" r="2"/><circle cx="350" cy="400" r="2"/>
    <circle cx="450" cy="400" r="2"/><circle cx="550" cy="400" r="2"/>
    <circle cx="650" cy="400" r="2"/><circle cx="750" cy="400" r="2"/>
    <circle cx="50" cy="450" r="2"/><circle cx="150" cy="450" r="2"/>
    <circle cx="250" cy="450" r="2"/><circle cx="350" cy="450" r="2"/>
    <circle cx="450" cy="450" r="2"/><circle cx="550" cy="450" r="2"/>
    <circle cx="650" cy="450" r="2"/><circle cx="750" cy="450" r="2"/>
  </g>

  <!-- Glow -->
  <rect width="800" height="500" fill="url(#glow)"/>

  <!-- Accent bar top -->
  <rect width="800" height="2" fill="#10b981" opacity="0.3"/>

  <!-- Bottom accent bar -->
  <rect y="498" width="800" height="2" fill="#10b981" opacity="0.3"/>

  <!-- Title text -->
  <text x="400" y="390" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="600" fill="#6ee7b7" opacity="0.8">School Attendance System</text>
  <text x="400" y="415" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6ee7b7" opacity="0.4">QR-based tracking · Firebase</text>

  <!-- Book icon -->
  <g transform="translate(400, 195)">
    <!-- Book bottom -->
    <rect x="-80" y="-20" width="160" height="120" rx="6" fill="url(#accent)" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.3"/>
    <!-- Book spine -->
    <rect x="-80" y="-20" width="8" height="120" rx="3" fill="#059669" opacity="0.4"/>
    <!-- Book cover overlay -->
    <rect x="-72" y="-14" width="152" height="108" rx="3" fill="none" stroke="#34d399" stroke-width="0.5" stroke-opacity="0.15"/>
    <!-- Pages -->
    <line x1="-60" y1="10" x2="60" y2="10" stroke="#34d399" stroke-width="1" stroke-opacity="0.15"/>
    <line x1="-60" y1="25" x2="60" y2="25" stroke="#34d399" stroke-width="1" stroke-opacity="0.15"/>
    <line x1="-60" y1="40" x2="60" y2="40" stroke="#34d399" stroke-width="1" stroke-opacity="0.15"/>
    <line x1="-60" y1="55" x2="60" y2="55" stroke="#34d399" stroke-width="1" stroke-opacity="0.15"/>
    <line x1="-60" y1="70" x2="45" y2="70" stroke="#34d399" stroke-width="1" stroke-opacity="0.15"/>
    <!-- QR code block on top page -->
    <rect x="-15" y="28" width="30" height="30" rx="2" fill="#10b981" opacity="0.08"/>
    <g transform="translate(-11, 32)" fill="#34d399" fill-opacity="0.35">
      <rect x="0" y="0" width="4" height="4"/><rect x="8" y="0" width="4" height="4"/>
      <rect x="16" y="0" width="4" height="4"/><rect x="0" y="8" width="4" height="4"/>
      <rect x="8" y="8" width="4" height="4"/><rect x="0" y="16" width="4" height="4"/>
      <rect x="8" y="16" width="4" height="4"/><rect x="16" y="16" width="4" height="4"/>
    </g>
    <!-- Book mark -->
    <path d="M-6,-20 L0,-10 L6,-20" fill="none" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.5"/>

    <!-- Hat / Graduation cap -->
    <path d="M-55,-28 L0,-60 L55,-28 L0,-5 Z" fill="none" stroke="url(#icon)" stroke-width="1.5" stroke-opacity="0.4"/>
    <path d="M0,-60 L0,-48" stroke="url(#icon)" stroke-width="1.5" stroke-opacity="0.4"/>
    <!-- Tassel -->
    <path d="M0,-60 Q15,-58 20,-50" fill="none" stroke="#34d399" stroke-width="1" stroke-opacity="0.4"/>
  </g>
</svg>
